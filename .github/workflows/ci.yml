name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: salta-ci-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate npm lockfile registry
        shell: bash
        run: |
          if grep -q "packages.applied-caas-gateway\|internal.api.openai.org" package-lock.json; then
            echo "::error::package-lock.json contains an internal npm registry URL"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci --no-audit --no-fund --registry=https://registry.npmjs.org/

      - name: Run checks
        run: npm run check
